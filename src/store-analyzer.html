<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#160329">
<title>Store Analyzer — Analiza tiendas Shopify · Arraiz Tools</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%237c3aed'/%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='52' font-family='system-ui'%3E🔍%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--pd:#160329;--pk:#25094a;--pm:#5b21b6;--pb:#7c3aed;--pl:#a855f7;--pg:#c084fc;--gold:#f59e0b;--gold2:#fcd34d;--green:#10b981;--greend:#065f46;--red:#ef4444;--txt:#f5f3ff;--muted:#b8a5e0;--dim:#8b7aaa;--cbg:rgba(91,33,182,0.12);--cbr:rgba(168,85,247,0.22)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'Plus Jakarta Sans',-apple-system,sans-serif}
html{scroll-behavior:smooth}
body{background:var(--pd);color:var(--txt);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;letter-spacing:-.005em}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at top left,rgba(124,58,237,.22),transparent 50%),radial-gradient(ellipse at bottom right,rgba(168,85,247,.15),transparent 50%);pointer-events:none}
body::after{content:'';position:fixed;inset:0;z-index:0;background-image:radial-gradient(circle at 1px 1px,rgba(168,85,247,.04) 1px,transparent 0);background-size:32px 32px;pointer-events:none;opacity:.5}
.wrap{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:0 18px 60px}
.back{display:inline-flex;align-items:center;gap:8px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:600;margin:24px 0 0;padding:8px 0;transition:color .2s}
.back:hover{color:var(--pg)}
header{padding:28px 0 20px;text-align:center}
.tool-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(124,58,237,.2);border:1px solid rgba(168,85,247,.3);color:var(--pg);font-weight:800;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;padding:5px 14px;border-radius:100px;margin-bottom:14px}
header h1{font-weight:800;font-size:clamp(26px,6vw,36px);line-height:1.1;letter-spacing:-.025em;background:linear-gradient(135deg,#fff 0%,var(--pg) 70%,var(--gold2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px}
header p{color:var(--muted);font-size:14px;line-height:1.6;max-width:500px;margin:0 auto}
.search-box{background:var(--cbg);border:1px solid var(--cbr);border-radius:18px;padding:22px 20px;margin-top:20px}
.search-row{display:flex;gap:10px}
.search-input{flex:1;background:rgba(255,255,255,.05);border:1.5px solid rgba(168,85,247,.25);border-radius:12px;padding:13px 16px;color:var(--txt);font-size:15px;font-weight:600;outline:none;transition:border-color .2s,box-shadow .2s;font-family:inherit}
.search-input:focus{border-color:var(--pl);box-shadow:0 0 0 3px rgba(168,85,247,.15)}
.search-input::placeholder{color:rgba(184,165,224,.35);font-weight:500}
.btn{padding:13px 22px;background:linear-gradient(135deg,var(--pb),var(--pm));border:none;border-radius:12px;color:white;font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;font-family:inherit;white-space:nowrap;min-width:120px}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,58,237,.35)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:none}
.spinner.show{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* Results */
#results{display:none;margin-top:20px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.store-header{background:var(--cbg);border:1px solid var(--cbr);border-radius:16px;padding:20px 20px;margin-bottom:14px}
.store-name{font-weight:800;font-size:20px;color:white;margin-bottom:4px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.shopify-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(149,191,71,.15);border:1px solid rgba(149,191,71,.35);color:#95bf47;font-size:10px;font-weight:800;padding:3px 10px;border-radius:100px;letter-spacing:.8px;text-transform:uppercase}
.store-desc{font-size:13px;color:var(--muted);line-height:1.5;margin-top:6px}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
@media(min-width:600px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
.stat-card{background:var(--cbg);border:1px solid var(--cbr);border-radius:14px;padding:16px 14px;text-align:center}
.stat-num{font-weight:900;font-size:22px;color:white;letter-spacing:-.02em;line-height:1}
.stat-lbl{font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-top:4px;font-weight:700}

.section-card{background:var(--cbg);border:1px solid var(--cbr);border-radius:16px;padding:20px 18px;margin-bottom:14px}
.section-h{font-weight:800;font-size:14px;color:white;margin-bottom:14px;display:flex;align-items:center;gap:7px}

/* Tech pills */
.tech-wrap{display:flex;flex-wrap:wrap;gap:8px}
.tech-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:100px;font-size:12px;font-weight:700;border-width:1px;border-style:solid}

/* Categories */
.cat-list{display:flex;flex-direction:column;gap:8px}
.cat-row{display:flex;align-items:center;gap:10px}
.cat-name{font-size:13px;color:var(--muted);font-weight:600;min-width:120px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-bar-wrap{flex:1;height:6px;background:rgba(168,85,247,.15);border-radius:100px;overflow:hidden}
.cat-bar{height:100%;background:linear-gradient(90deg,var(--pb),var(--pl));border-radius:100px;transition:width .6s ease}
.cat-count{font-size:12px;color:var(--dim);font-weight:700;min-width:28px;text-align:right}

/* Best sellers */
.products-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(min-width:500px){.products-grid{grid-template-columns:repeat(3,1fr)}}
.product-card{background:rgba(255,255,255,.04);border:1px solid rgba(168,85,247,.15);border-radius:12px;overflow:hidden;position:relative}
.product-img{width:100%;aspect-ratio:1;object-fit:cover;background:rgba(124,58,237,.12);display:block}
.product-img-placeholder{width:100%;aspect-ratio:1;background:rgba(124,58,237,.12);display:flex;align-items:center;justify-content:center;font-size:28px}
.product-info{padding:10px 10px 12px}
.product-rank{position:absolute;top:8px;left:8px;width:22px;height:22px;background:var(--gold);color:#1a0533;font-size:10px;font-weight:900;border-radius:50%;display:flex;align-items:center;justify-content:center}
.product-name{font-size:11.5px;font-weight:700;color:var(--txt);line-height:1.4;margin-bottom:4px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.product-price{font-size:13px;font-weight:900;color:var(--gold)}

/* Error */
.error-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:14px;padding:20px;text-align:center;color:#fca5a5;font-size:14px;font-weight:600;line-height:1.6}

footer{text-align:center;padding:28px 0 10px;color:var(--dim);font-size:12px;font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← Volver a Arraiz Tools</a>
  <header>
    <div class="tool-badge">🔍 Herramienta</div>
    <h1>Store Analyzer</h1>
    <p>Analiza cualquier tienda Shopify. Descubre productos, precios, categorías más vendidas y las tecnologías que usan.</p>
  </header>

  <div class="search-box">
    <div class="search-row">
      <input class="search-input" id="domainInput" type="text" placeholder="ejemplo.com o www.tienda.com" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
      <button class="btn" id="btnAnalyze" onclick="analyze()">
        <div class="spinner" id="spinner"></div>
        <span id="btnTxt">Analizar</span>
      </button>
    </div>
    <div style="font-size:11.5px;color:var(--dim);margin-top:10px;line-height:1.5">
      ⚡ Solo funciona con tiendas <strong style="color:var(--pg)">Shopify</strong>. Ingresa el dominio sin https://
    </div>
  </div>

  <div id="results"></div>

  <footer>💜 Arraiz Tools · Comunidad Arraiz</footer>
</div>

<script>
const TECH_COLORS={
  'Meta Pixel':{bg:'rgba(24,119,242,.15)',border:'rgba(24,119,242,.35)',color:'#60a5fa',emoji:'📘'},
  'TikTok Pixel':{bg:'rgba(0,0,0,.3)',border:'rgba(255,255,255,.15)',color:'#f1f5f9',emoji:'🎵'},
  'Google Analytics':{bg:'rgba(234,67,53,.12)',border:'rgba(234,67,53,.3)',color:'#fca5a5',emoji:'📊'},
  'Google Ads':{bg:'rgba(66,133,244,.12)',border:'rgba(66,133,244,.3)',color:'#93c5fd',emoji:'🎯'},
  'Pinterest':{bg:'rgba(189,8,28,.12)',border:'rgba(189,8,28,.3)',color:'#fca5a5',emoji:'📌'},
  'Klaviyo':{bg:'rgba(103,58,183,.15)',border:'rgba(103,58,183,.35)',color:'#c4b5fd',emoji:'📧'},
  'Judge.me':{bg:'rgba(245,158,11,.12)',border:'rgba(245,158,11,.3)',color:'#fcd34d',emoji:'⭐'},
  'Loox':{bg:'rgba(16,185,129,.12)',border:'rgba(16,185,129,.3)',color:'#6ee7b7',emoji:'📸'},
  'Hotjar':{bg:'rgba(253,160,74,.12)',border:'rgba(253,160,74,.3)',color:'#fdba74',emoji:'🔥'},
  'Tidio':{bg:'rgba(124,58,237,.15)',border:'rgba(124,58,237,.35)',color:'#a78bfa',emoji:'💬'},
  'ReConvert':{bg:'rgba(16,185,129,.12)',border:'rgba(16,185,129,.3)',color:'#6ee7b7',emoji:'🔄'},
  'Releasit COD':{bg:'rgba(245,158,11,.12)',border:'rgba(245,158,11,.3)',color:'#fcd34d',emoji:'💵'},
  'Snapchat Pixel':{bg:'rgba(255,252,0,.1)',border:'rgba(255,252,0,.25)',color:'#fef08a',emoji:'👻'},
  'Microsoft Clarity':{bg:'rgba(0,120,212,.12)',border:'rgba(0,120,212,.3)',color:'#7dd3fc',emoji:'🔵'},
  'Vitals':{bg:'rgba(124,58,237,.15)',border:'rgba(124,58,237,.35)',color:'#c084fc',emoji:'⚡'},
  'Privy':{bg:'rgba(236,72,153,.12)',border:'rgba(236,72,153,.3)',color:'#f9a8d4',emoji:'💌'},
  'Omnisend':{bg:'rgba(16,185,129,.12)',border:'rgba(16,185,129,.3)',color:'#6ee7b7',emoji:'📨'},
};

const TECH_PATTERNS={
  'Meta Pixel':/connect\.facebook\.net|fbevents\.js|fbq\s*\(/,
  'TikTok Pixel':/analytics\.tiktok\.com|ttq\.|tiktok-pixel/i,
  'Google Analytics':/googletagmanager\.com|gtag|google-analytics\.com\/analytics/,
  'Google Ads':/googleadservices\.com|google_conversion|AW-\d+/,
  'Pinterest':/pintrk\(|pinterest\.com\/v3\//,
  'Klaviyo':/klaviyo\.com|klaviyo/i,
  'Judge.me':/judge\.me|judgeme/i,
  'Loox':/loox\.io|looxio/i,
  'Hotjar':/hotjar\.com|hjSetting/,
  'Tidio':/tidiochat\.com|tidio/i,
  'ReConvert':/reconvert\.com/i,
  'Releasit COD':/releasit\.com|releasit-cod/i,
  'Snapchat Pixel':/tr\.snapchat\.com|snap\.licdn\.com|snaptr/,
  'Microsoft Clarity':/clarity\.ms|microsoft\.com\/clarity/,
  'Vitals':/vitals\.co|getVitals/i,
  'Privy':/privymce\.com|privy/i,
  'Omnisend':/omnisend\.com/i,
};

function fmt(n){return new Intl.NumberFormat('es-CO').format(Math.round(n))}
function fmtUSD(n){return '$'+fmt(n)}
function cleanDomain(d){return d.trim().replace(/^https?:\/\//,'').replace(/\/.*$/,'').replace(/^www\./,'').toLowerCase()}

function setLoading(on){
  document.getElementById('btnAnalyze').disabled=on;
  document.getElementById('spinner').className='spinner'+(on?' show':'');
  document.getElementById('btnTxt').textContent=on?'Analizando...':'Analizar';
}

async function analyze(){
  let raw=document.getElementById('domainInput').value.trim();
  if(!raw){alert('Ingresa un dominio');return;}
  const domain=cleanDomain(raw);
  setLoading(true);
  document.getElementById('results').style.display='none';
  try{
    // Fetch products
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),12000);
    let productsData=null,collectionsData=null,htmlText='';
    try{
      const [pr,cr,hr]=await Promise.allSettled([
        fetch('https://'+domain+'/products.json?limit=250',{signal:ctrl.signal}),
        fetch('https://'+domain+'/collections/all/products.json?sort_by=best-selling&limit=12',{signal:ctrl.signal}),
        fetch('https://api.allorigins.win/raw?url='+encodeURIComponent('https://'+domain+'/'),{signal:ctrl.signal}),
      ]);
      clearTimeout(timer);
      if(pr.status==='fulfilled'&&pr.value.ok){productsData=await pr.value.json();}
      if(cr.status==='fulfilled'&&cr.value.ok){collectionsData=await cr.value.json();}
      if(hr.status==='fulfilled'&&hr.value.ok){htmlText=await hr.value.text();}
    }catch(e){clearTimeout(timer);}

    if(!productsData||!productsData.products){
      showError('Esta tienda no es Shopify o no permite el acceso público. Intenta con otra.');
      return;
    }

    const products=productsData.products||[];
    const bestSellers=(collectionsData?.products||[]).slice(0,6);

    // Stats
    const prices=products.flatMap(p=>p.variants.map(v=>parseFloat(v.price)||0)).filter(p=>p>0);
    const avgPrice=prices.length?prices.reduce((a,b)=>a+b,0)/prices.length:0;
    const minPrice=prices.length?Math.min(...prices):0;
    const maxPrice=prices.length?Math.max(...prices):0;

    // Top types
    const typeCounts={};
    products.forEach(p=>{const t=p.product_type||'Sin categoría';typeCounts[t]=(typeCounts[t]||0)+1});
    const topTypes=Object.entries(typeCounts).sort((a,b)=>b[1]-a[1]).slice(0,6);
    const maxCount=topTypes[0]?.[1]||1;

    // Tech detection
    const detectedTech=[];
    for(const[name,pattern]of Object.entries(TECH_PATTERNS)){if(pattern.test(htmlText))detectedTech.push(name);}

    // Store name from products or domain
    const storeName=domain;

    renderResults({domain,storeName,total:products.length,avgPrice,minPrice,maxPrice,topTypes,maxCount,bestSellers,detectedTech});
  }catch(e){
    showError('Error al analizar la tienda. Verifica el dominio e inténtalo de nuevo.');
  }finally{setLoading(false);}
}

function showError(msg){
  const r=document.getElementById('results');
  r.innerHTML='<div class="error-box">⚠️ '+msg+'</div>';
  r.style.display='block';
}

function renderResults({domain,storeName,total,avgPrice,minPrice,maxPrice,topTypes,maxCount,bestSellers,detectedTech}){
  let html='';

  // Store header
  html+='<div class="store-header">';
  html+='<div class="store-name">'+escH(storeName.toUpperCase())+' <span class="shopify-badge">Shopify</span></div>';
  html+='<div class="store-desc">'+escH(domain)+'</div>';
  html+='</div>';

  // Stats
  html+='<div class="stats-grid">';
  html+=statCard(total,'Productos');
  html+=statCard(avgPrice>0?fmtUSD(avgPrice):'—','Precio prom.');
  html+=statCard(minPrice>0?fmtUSD(minPrice):'—','Precio min.');
  html+=statCard(maxPrice>0?fmtUSD(maxPrice):'—','Precio max.');
  html+='</div>';

  // Tech
  if(detectedTech.length>0){
    html+='<div class="section-card"><div class="section-h">🛠 Tecnologías detectadas</div><div class="tech-wrap">';
    detectedTech.forEach(t=>{
      const c=TECH_COLORS[t]||{bg:'rgba(168,85,247,.15)',border:'rgba(168,85,247,.3)',color:'var(--pg)',emoji:'🔧'};
      html+='<span class="tech-pill" style="background:'+c.bg+';border-color:'+c.border+';color:'+c.color+'">'+c.emoji+' '+escH(t)+'</span>';
    });
    html+='</div></div>';
  }else if(detectedTech.length===0){
    html+='<div class="section-card"><div class="section-h">🛠 Tecnologías</div><div style="font-size:13px;color:var(--dim)">No se pudieron detectar tecnologías (requiere acceso al HTML de la tienda).</div></div>';
  }

  // Categories
  if(topTypes.length>0){
    html+='<div class="section-card"><div class="section-h">📦 Categorías principales</div><div class="cat-list">';
    topTypes.forEach(([name,count])=>{
      const pct=Math.round(count/maxCount*100);
      html+='<div class="cat-row"><div class="cat-name">'+escH(name)+'</div><div class="cat-bar-wrap"><div class="cat-bar" style="width:'+pct+'%"></div></div><div class="cat-count">'+count+'</div></div>';
    });
    html+='</div></div>';
  }

  // Best sellers
  if(bestSellers.length>0){
    html+='<div class="section-card"><div class="section-h">🏆 Más vendidos</div><div class="products-grid">';
    bestSellers.slice(0,6).forEach((p,i)=>{
      const img=p.images?.[0]?.src;
      const price=p.variants?.[0]?.price;
      html+='<div class="product-card"><div class="product-rank">'+(i+1)+'</div>';
      if(img)html+='<img class="product-img" src="'+escH(img)+'&width=240" alt="" loading="lazy">';
      else html+='<div class="product-img-placeholder">📦</div>';
      html+='<div class="product-info"><div class="product-name">'+escH(p.title)+'</div>';
      if(price)html+='<div class="product-price">$'+escH(parseFloat(price).toFixed(2))+'</div>';
      html+='</div></div>';
    });
    html+='</div></div>';
  }

  const r=document.getElementById('results');
  r.innerHTML=html;
  r.style.display='block';
  r.scrollIntoView({behavior:'smooth',block:'start'});
}

function statCard(val,lbl){
  return '<div class="stat-card"><div class="stat-num">'+escH(String(val))+'</div><div class="stat-lbl">'+escH(lbl)+'</div></div>';
}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

document.getElementById('domainInput').addEventListener('keydown',e=>{if(e.key==='Enter')analyze()});
</script>
</body>
</html>
